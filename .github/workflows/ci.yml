name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv venv --python 3.13
      - name: Install
        run: uv pip install -e ".[dev]"
      - name: Unit tests (incl. dbt integration)
        run: uv run pytest
      - name: dbt build + tests (local DuckDB target)
        run: uv run adp dbt
      - name: Evaluation suite (gates the build)
        run: uv run adp eval
