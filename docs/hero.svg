<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="880" height="300"
     font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="aurora" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="300" y2="0" spreadMethod="repeat">
      <stop offset="0" stop-color="#FF2D55"/><stop offset="0.25" stop-color="#AF52DE"/>
      <stop offset="0.5" stop-color="#0A84FF"/><stop offset="0.75" stop-color="#5AC8FA"/>
      <stop offset="1" stop-color="#FF2D55"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="300 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="ringg" gradientUnits="userSpaceOnUse" x1="398" y1="116" x2="482" y2="200">
      <stop offset="0" stop-color="#AF52DE"/><stop offset="0.5" stop-color="#0A84FF"/><stop offset="1" stop-color="#5AC8FA"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#AF52DE" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#0A84FF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#0A84FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0A84FF" stop-opacity="0.9"/><stop offset="1" stop-color="#0A84FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="880" height="300" rx="18" fill="#ffffff"/>

  <!-- title + glow -->
  <ellipse cx="440" cy="52" rx="300" ry="54" fill="url(#glow)" opacity="0.15">
    <animate attributeName="opacity" values="0.09;0.19;0.09" keyTimes="0;0.5;1" dur="5s"
             calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/>
  </ellipse>
  <text x="440" y="54" text-anchor="middle" font-size="38" font-weight="600" letter-spacing="-1" fill="url(#aurora)">Agentic Data Platform</text>
  <text x="440" y="82" text-anchor="middle" font-size="14.5" font-weight="400" fill="#6e6e73">An LLM agent that ingests, transforms, validates &amp; serves data</text>

  <!-- inbound / outbound -->
  <text x="74" y="153" text-anchor="middle" font-size="11.5" fill="#6e6e73">raw</text>
  <text x="74" y="167" text-anchor="middle" font-size="11.5" fill="#6e6e73">sources</text>
  <g fill="#c7c7cc"><circle cx="116" cy="142" r="3"/><circle cx="116" cy="158" r="3"/><circle cx="116" cy="174" r="3"/></g>
  <line x1="130" y1="158" x2="396" y2="158" stroke="#e3e3e8" stroke-width="1.5"/>
  <line x1="484" y1="158" x2="742" y2="158" stroke="#e3e3e8" stroke-width="1.5"/>
  <text x="792" y="153" text-anchor="middle" font-size="11.5" fill="#6e6e73">served data</text>
  <text x="792" y="167" text-anchor="middle" font-size="11.5" fill="#6e6e73">· API ·</text>

  <!-- tool fan-out: connectors + chips -->
  <g stroke="#ececf0" stroke-width="1.2">
    <line x1="440" y1="198" x2="250" y2="232"/><line x1="440" y1="198" x2="377" y2="232"/>
    <line x1="440" y1="198" x2="504" y2="232"/><line x1="440" y1="198" x2="631" y2="232"/>
  </g>
  <g font-size="11" font-weight="500" fill="#5f6f7b" text-anchor="middle">
    <rect x="198" y="232" width="104" height="28" rx="14" fill="#f7f8fa" stroke="#e3e6eb"/><text x="250" y="250">ingest</text>
    <rect x="325" y="232" width="104" height="28" rx="14" fill="#f7f8fa" stroke="#e3e6eb"/><text x="377" y="250">run_dbt</text>
    <rect x="452" y="232" width="104" height="28" rx="14" fill="#f7f8fa" stroke="#e3e6eb"/><text x="504" y="250">run_sql</text>
    <rect x="579" y="232" width="104" height="28" rx="14" fill="#f7f8fa" stroke="#e3e6eb"/><text x="631" y="250">validate</text>
  </g>

  <!-- spark that darts from the agent out to each tool and back (fan-out + retract) -->
  <circle r="9" fill="url(#spark)">
    <animateMotion dur="5.2s" repeatCount="indefinite"
      path="M440,182 L250,246 L440,182 L377,246 L440,182 L504,246 L440,182 L631,246 L440,182"/>
  </circle>
  <circle r="4" fill="#0A84FF">
    <animateMotion dur="5.2s" repeatCount="indefinite"
      path="M440,182 L250,246 L440,182 L377,246 L440,182 L504,246 L440,182 L631,246 L440,182"/>
  </circle>

  <!-- the agent loop ring + orbiting spark -->
  <circle cx="440" cy="158" r="42" fill="#ffffff" stroke="#e6e6eb" stroke-width="2"/>
  <circle cx="440" cy="158" r="42" fill="none" stroke="url(#ringg)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="140 125" opacity="0.9">
    <animateTransform attributeName="transform" type="rotate" from="0 440 158" to="360 440 158" dur="3.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="10" fill="url(#spark)">
    <animateMotion path="M440,116 A42,42 0 1,1 440,200 A42,42 0 1,1 440,116" dur="3.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="4.5" fill="#AF52DE">
    <animateMotion path="M440,116 A42,42 0 1,1 440,200 A42,42 0 1,1 440,116" dur="3.6s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#AF52DE;#0A84FF;#5AC8FA;#AF52DE" dur="3.6s" repeatCount="indefinite"/>
  </circle>
  <text x="440" y="155" text-anchor="middle" font-size="14" font-weight="600" fill="#1d1d1f">Agent</text>
  <text x="440" y="170" text-anchor="middle" font-size="9" font-weight="500" fill="#86868b">loop</text>

  <!-- caption -->
  <text x="440" y="288" text-anchor="middle" font-size="12" font-weight="500" fill="#6e6e73">
    plan → execute → observe<tspan fill="#a1a1a6" font-weight="400">  ·  fans out to typed tools  ·  retries &amp; self-repairs</tspan>
  </text>
</svg>
