<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 860" width="1480" height="860" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b7286"/>
    </marker>
    <style>
      .title{font-size:34px;font-weight:700;fill:#15324a}
      .subtitle{font-size:16px;fill:#5f6f7b}
      .h{font-size:16px;font-weight:600;fill:#1c2c36;text-anchor:middle}
      .h2{font-size:18px;font-weight:700;fill:#15324a;text-anchor:middle}
      .s{font-size:12.5px;fill:#5f6f7b;text-anchor:middle}
      .s2{font-size:11.5px;fill:#5f6f7b;text-anchor:middle}
      .chip{font-size:13px;font-weight:600;fill:#1c4a6e;text-anchor:middle}
      .badge{font-size:12px;font-weight:600;fill:#2a5b38;text-anchor:middle}
      .concern{font-size:11px;font-weight:600;fill:#33485a;text-anchor:middle}
      .mono{font-size:13.5px;font-weight:600;fill:#5a4a2a;text-anchor:middle}
      .lbl{font-size:11px;fill:#7a8893;text-anchor:middle}
    </style>
  </defs>

  <rect x="0" y="0" width="1480" height="860" fill="#ffffff"/>

  <!-- header -->
  <text x="48" y="50" class="title">Agentic Data Platform</text>
  <text x="50" y="80" class="subtitle">An LLM agent that ingests, transforms with dbt, validates and serves data &#8212; portable across DuckDB &#183; MotherDuck &#183; BigQuery</text>

  <!-- ===== Tier 1: control plane ===== -->
  <rect x="48" y="128" width="180" height="72" rx="10" fill="#f5f8fa" stroke="#ccd8e2"/>
  <text x="138" y="160" class="h">Task</text>
  <text x="138" y="182" class="s">natural language / hints</text>

  <rect x="258" y="128" width="196" height="72" rx="10" fill="#f5f8fa" stroke="#ccd8e2"/>
  <text x="356" y="160" class="h">Planner</text>
  <text x="356" y="182" class="s">LLM &#183; deterministic fallback</text>

  <rect x="484" y="116" width="372" height="96" rx="12" fill="#fdf3ec" stroke="#c8743a" stroke-width="1.5"/>
  <text x="670" y="148" class="h2">Agent runtime</text>
  <text x="670" y="171" class="s">plan &#8594; execute &#8594; observe</text>
  <text x="670" y="192" class="s2">centralized tool loop &#183; retry &#183; SQL self-repair &#183; circuit breaker</text>

  <rect x="900" y="116" width="486" height="96" rx="12" fill="#f4eef8" stroke="#cdb9da" stroke-width="1.5"/>
  <text x="1143" y="148" class="h2">Memory</text>
  <text x="1143" y="171" class="s">catalog &#183; run history &#183; lineage</text>
  <text x="1143" y="192" class="s2">+ dbt manifest DAG (persisted in meta schema)</text>

  <line x1="228" y1="164" x2="256" y2="164" stroke="#5b7286" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="454" y1="164" x2="482" y2="164" stroke="#5b7286" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="856" y1="164" x2="898" y2="164" stroke="#5b7286" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- distribution rail from agent to tools -->
  <line x1="670" y1="212" x2="670" y2="252" stroke="#5b7286" stroke-width="2"/>
  <line x1="256" y1="252" x2="1224" y2="252" stroke="#9fb0bd" stroke-width="2"/>
  <line x1="256" y1="252" x2="256" y2="274" stroke="#5b7286" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="498" y1="252" x2="498" y2="274" stroke="#5b7286" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="740" y1="252" x2="740" y2="274" stroke="#5b7286" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="982" y1="252" x2="982" y2="274" stroke="#5b7286" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1224" y1="252" x2="1224" y2="274" stroke="#5b7286" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="690" y="244" class="lbl" text-anchor="start">tool registry &#183; typed tools</text>

  <!-- ===== Tier 2: tools ===== -->
  <g>
    <rect x="144" y="276" width="224" height="46" rx="9" fill="#e9f1f8" stroke="#bcd2e6"/>
    <text x="256" y="304" class="chip">ingest_file</text>
    <rect x="386" y="276" width="224" height="46" rx="9" fill="#e9f1f8" stroke="#bcd2e6"/>
    <text x="498" y="304" class="chip">run_dbt</text>
    <rect x="628" y="276" width="224" height="46" rx="9" fill="#e9f1f8" stroke="#bcd2e6"/>
    <text x="740" y="304" class="chip">build_panel</text>
    <rect x="870" y="276" width="224" height="46" rx="9" fill="#e9f1f8" stroke="#bcd2e6"/>
    <text x="982" y="304" class="chip">run_sql &#183; create_dataset</text>
    <rect x="1112" y="276" width="224" height="46" rx="9" fill="#e9f1f8" stroke="#bcd2e6"/>
    <text x="1224" y="304" class="chip">validate_dataset</text>
  </g>

  <!-- ===== Tier 3: transform + storage ===== -->
  <rect x="300" y="396" width="300" height="112" rx="12" fill="#eef4ee" stroke="#b7cdbb"/>
  <text x="450" y="430" class="h2">dbt project</text>
  <text x="450" y="455" class="s">staging &#183; marts models</text>
  <text x="450" y="478" class="s2">schema + grain tests &#183; versioned, portable SQL</text>

  <rect x="680" y="396" width="560" height="112" rx="12" fill="#eef4ee" stroke="#b7cdbb"/>
  <text x="960" y="428" class="h2">Warehouse</text>
  <text x="960" y="450" class="s">layers: raw &#183; staging &#183; marts &#183; meta</text>
  <rect x="700" y="470" width="168" height="26" rx="13" fill="#dcebe0" stroke="#a9c6b1"/>
  <text x="784" y="487" class="badge">DuckDB &#183; local</text>
  <rect x="882" y="470" width="196" height="26" rx="13" fill="#dcebe0" stroke="#a9c6b1"/>
  <text x="980" y="487" class="badge">MotherDuck &#183; cloud</text>
  <rect x="1092" y="470" width="128" height="26" rx="13" fill="#dcebe0" stroke="#a9c6b1"/>
  <text x="1156" y="487" class="badge">BigQuery</text>

  <!-- tool -> storage arrows -->
  <line x1="256" y1="322" x2="710" y2="394" stroke="#5b7286" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="498" y1="322" x2="455" y2="394" stroke="#5b7286" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="740" y1="322" x2="780" y2="394" stroke="#5b7286" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="982" y1="322" x2="982" y2="394" stroke="#5b7286" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1224" y1="322" x2="1180" y2="394" stroke="#5b7286" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="450" x2="678" y2="450" stroke="#5b7286" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="640" y="442" class="lbl">builds</text>

  <!-- memory <-> meta -->
  <line x1="1143" y1="212" x2="1143" y2="394" stroke="#b39ac4" stroke-width="1.8" stroke-dasharray="5 4"/>

  <!-- ===== Tier 4: serving ===== -->
  <line x1="960" y1="508" x2="960" y2="598" stroke="#5b7286" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="680" y="600" width="560" height="66" rx="12" fill="#eaf4f1" stroke="#a9cfc4"/>
  <text x="960" y="628" class="h2">FastAPI &#8212; serves data to researchers</text>
  <text x="960" y="650" class="s2">/datasets &#183; /datasets/&#123;name&#125;/schema &#183; /lineage &#183; /catalog &#183; /metrics &#183; POST /agent/run</text>

  <!-- ===== Tier 5: monitoring (cross-cutting) ===== -->
  <rect x="48" y="710" width="1338" height="52" rx="10" fill="#f3f1ec" stroke="#d8cfbf" stroke-dasharray="6 4"/>
  <text x="717" y="742" class="mono">Monitoring &#8212; structured JSON logs &#183; counters &#183; latency p50/p95 &#183; instruments every tool, LLM &amp; dbt call &#160;&#8594;&#160; GET /metrics</text>

  <!-- ===== footer: seven production concerns ===== -->
  <g>
    <rect x="48" y="788" width="180" height="34" rx="17" fill="#eef2f6" stroke="#cdd8e2"/>
    <text x="138" y="810" class="concern">1 &#183; task decomposition</text>
    <rect x="240" y="788" width="160" height="34" rx="17" fill="#eef2f6" stroke="#cdd8e2"/>
    <text x="320" y="810" class="concern">2 &#183; tool calling</text>
    <rect x="412" y="788" width="120" height="34" rx="17" fill="#eef2f6" stroke="#cdd8e2"/>
    <text x="472" y="810" class="concern">3 &#183; memory</text>
    <rect x="544" y="788" width="196" height="34" rx="17" fill="#eef2f6" stroke="#cdd8e2"/>
    <text x="642" y="810" class="concern">4 &#183; retry / self-repair</text>
    <rect x="752" y="788" width="150" height="34" rx="17" fill="#eef2f6" stroke="#cdd8e2"/>
    <text x="827" y="810" class="concern">5 &#183; evaluation</text>
    <rect x="914" y="788" width="150" height="34" rx="17" fill="#eef2f6" stroke="#cdd8e2"/>
    <text x="989" y="810" class="concern">6 &#183; monitoring</text>
    <rect x="1076" y="788" width="140" height="34" rx="17" fill="#eef2f6" stroke="#cdd8e2"/>
    <text x="1146" y="810" class="concern">7 &#183; stability</text>
  </g>
</svg>
